name: Add funeral home

# Staff-triggered onboarding: detect a funeral home's platform, verify it, and
# open a PR adding it to data/funeral_homes.json. Runs the same
# scripts/add_home.py the CLI uses. Triggered from the staff admin page
# (web/public/admin.html) via the workflow-dispatch API, or from the Actions tab.
#
# No submission dead-ends: if the home can't be auto-added (a platform we don't
# support yet, or a fetch/verify failure), the workflow opens a GitHub issue
# assigned to the repo owner so the team is alerted to look into it — then
# re-run this workflow with the same URL once it's resolved.
#
# Note: opening the PR needs "Allow GitHub Actions to create and approve pull
# requests" enabled in repo Settings → Actions → General.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "The funeral home's website (root or obituaries page)."
        type: string
        required: true
      name:
        description: "Override the home name (blank = use the name from the live API)."
        type: string
        default: ""
      match:
        description: "Override the match token (blank = derive from the domain)."
        type: string
        default: ""

permissions:
  contents: write        # push the branch with the new config entry
  pull-requests: write   # open the PR
  issues: write          # open a review issue when a home can't be auto-added

jobs:
  add-home:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect, verify, and stage the home
        id: detect
        run: |
          set +e
          python scripts/add_home.py "${{ inputs.url }}" \
            ${{ inputs.name && format('--name "{0}"', inputs.name) || '' }} \
            ${{ inputs.match && format('--match "{0}"', inputs.match) || '' }} \
            --write | tee out.txt
          code=${PIPESTATUS[0]}
          set -e
          {
            echo "## Add funeral home"
            echo '```'
            cat out.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Don't fail the run: an unrecognized home is flagged for review below,
          # not a build failure. Pass the outcome to the next steps.
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if git diff --quiet data/funeral_homes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open a pull request
        if: steps.detect.outputs.changed == 'true'
        run: |
          branch="add-home/${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/funeral_homes.json
          git commit -m "data: add funeral home from ${{ inputs.url }}"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Add funeral home: ${{ inputs.url }}" \
            --body "$(printf 'Onboarded via the Add funeral home workflow.\n\n```\n%s\n```\n\nReview the `match` token before merging — it must be a lowercase substring of the home name on its obituaries so scraped records link to the canonical home.' "$(cat out.txt)")"

      - name: Flag unrecognized home for review
        if: steps.detect.outputs.code != '0'
        run: |
          url="${{ inputs.url }}"
          out="$(cat out.txt)"
          # De-dupe: if an open review issue for this URL already exists, comment on it.
          existing=$(gh issue list --state open --search "in:title \"$url\"" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$(printf 'Re-submitted; still could not auto-add.\n\n```\n%s\n```' "$out")"
            echo "Commented on existing review issue #$existing." >> "$GITHUB_STEP_SUMMARY"
          else
            body=$(printf 'A funeral home submitted through the **Add funeral home** workflow could not be added automatically — it needs a look.\n\n**Website:** %s\n\n**What the detector said:**\n```\n%s\n```\n\n**To resolve:**\n1. Check whether the home is on a platform we support (Tukios or Tribute Technology). If it is and detection failed, the site may have been down — re-run the workflow with this URL.\n2. If it is a *new* platform, add support in `extract/` (see `docs/funeral-home-scraping.md`), then re-run the workflow.\n3. Otherwise, add the obituary through the manual intake path (`data/intake/`).\n\nClose this issue once the home is onboarded.' "$url" "$out")
            gh issue create \
              --title "Funeral home needs review: $url" \
              --body "$body" \
              --assignee "${{ github.actor }}"
            echo "Opened a review issue for $url." >> "$GITHUB_STEP_SUMMARY"
          fi
