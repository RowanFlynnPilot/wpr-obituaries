name: Build and deploy obituaries

on:
  schedule:
    # 11:00 UTC = 6:00 AM Central, after Mon/Wed/Fri publication.
    - cron: "0 11 * * 1,3,5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Extract every obituary post ever published"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract obituaries
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python extract/main.py --backfill
          else
            python extract/main.py
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build widget
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
