name: Build and deploy obituaries

on:
  schedule:
    # 11:00 UTC = 6:00 AM Central, after Mon/Wed/Fri publication.
    - cron: "0 11 * * 1,3,5"
  workflow_dispatch:
    inputs:
      seed_days:
        description: "One-off seed: extract this many days back (e.g. 180 for ~6 months). Blank = normal recent window."
        type: string
        default: ""
      backfill:
        description: "Extract every obituary post ever published (overrides seed days; long)"
        type: boolean
        default: false

permissions:
  contents: write  # commit the accumulating obituary master back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # ANTHROPIC_API_KEY + WEBSHARE_PROXY_URL are only needed when the
      # wordpress_scrape source is enabled (Haiku extraction + the proxied
      # Cloudflare fetch). An intake-only fork can leave both secrets unset —
      # the client/proxy are built lazily, only when that source runs.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # The branded share-cards (web/public/assets/og) are expensive to compose
      # and gitignored, so a clean checkout would regenerate all of them. Restore
      # the prior cards + their hash manifest so render only rebuilds the changed
      # ones. The key tracks the config (brand) and master (records); restore-keys
      # falls back to the most recent cache so a normal run is mostly cache hits.
      - name: Restore OG share-card cache
        uses: actions/cache@v4
        with:
          path: |
            web/public/assets/og
            .cache/og-cards.json
          key: og-cards-${{ hashFiles('newsroom.config.json', 'data/obituaries_master.json') }}
          restore-keys: |
            og-cards-

      - name: Run pipeline tests
        run: python extract/test_pipeline.py

      - name: Extract obituaries and render site
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python extract/main.py --backfill
          elif [ -n "${{ inputs.seed_days }}" ]; then
            python extract/main.py --days "${{ inputs.seed_days }}"
          else
            python extract/main.py
          fi

      # Persist the accumulating master and any newly-vendored portraits even when
      # extraction exits non-zero, so a single failed post never loses the records
      # that did succeed. A failed extract still stops the build below, so no
      # deploy happens that run.
      - name: Persist master and vendored photos
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data web/public/assets/photos 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "data: update obituaries master and photos [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build widget
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
